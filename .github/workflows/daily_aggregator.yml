name: Aggregator Daily Build

on:
  schedule:
    # 每天 UTC 01:00 运行（北京时间 09:00）
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      force_crawl:
        description: '强制重新爬取 (无视已存在的 raw-nodes)'
        required: false
        type: boolean
        default: false

concurrency:
  group: aggregator-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read # 必须授予此权限，工作流才能使用 gh CLI 读取历史运行记录

jobs:
  # --- 第一阶段：下载与聚合 ---
  fetch_raw:
    runs-on: ubuntu-latest
    outputs:
      skip_crawl: ${{ steps.check_artifact.outputs.skip_crawl }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Check and Restore Existing raw-nodes
      id: check_artifact
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if [ "${{ github.event.inputs.force_crawl }}" == "true" ]; then
          echo "用户选择了强制重新爬取，跳过工件检查。"
          echo "skip_crawl=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        echo "正在检查历史记录中尚未过期的 'raw-nodes'..."
        WORKFLOW_FILE=$(basename "${{ github.workflow_ref }}" | cut -d'@' -f1)
        PREV_RUN_ID=$(gh run list --workflow "$WORKFLOW_FILE" --json databaseId --jq '[.[] | select(.databaseId != '${{ github.run_id }}')] | .[0].databaseId // empty' || echo "")
        
        if [ -n "$PREV_RUN_ID" ]; then
          echo "找到上一次历史运行 ID: $PREV_RUN_ID"
          if gh run download "$PREV_RUN_ID" -n raw-nodes --dir .; then
            echo "成功下载未过期的 raw-nodes，将跳过本轮节点爬取！"
            echo "skip_crawl=true" >> $GITHUB_OUTPUT
          else
            echo "上一次运行的 raw-nodes 已过期被清理或不存在，需要重新爬取。"
            echo "skip_crawl=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "未找到任何历史运行记录，需要重新爬取。"
          echo "skip_crawl=false" >> $GITHUB_OUTPUT
        fi

    - name: Set up Python
      if: steps.check_artifact.outputs.skip_crawl != 'true'
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install Dependencies
      if: steps.check_artifact.outputs.skip_crawl != 'true'
      run: |
        python -m pip install --upgrade pip
        pip install requests PyYAML

    - name: Build Extra Source URL List
      if: steps.check_artifact.outputs.skip_crawl != 'true'
      run: |
        python upload_workers_yaml_to_gist.py \
          --no-upload-gist \
          --discover-gist-search \
          --emit-source-urls-file extra_source_urls.txt \
          --timeout 10 \
          --search-max-pages 3 \
          --fetch-retry-count 3 \
          --fetch-retry-backoff-seconds 60 \
          --search-query-workers 1 \
          --search-page-delay-seconds 3 \
          --search-rate-limit-retries 3 \
          --search-rate-limit-backoff-seconds 60 \
          --discover-content-workers 1 \
          --max-workers 4
        echo "额外源数量: $(wc -l < extra_source_urls.txt)"

    - name: Run Aggregator Script
      if: steps.check_artifact.outputs.skip_crawl != 'true'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        EXTRA_SOURCE_URLS_FILE: extra_source_urls.txt
      run: |
        python aggregator.py

    - name: Upload Raw Artifact
      uses: actions/upload-artifact@v4
      with:
        name: raw-nodes
        path: nodes.txt
        if-no-files-found: error
        retention-days: 1
        overwrite: true

  # --- 第二阶段：合并、清洗与测试 ---
  check_active:
    needs: fetch_raw
    runs-on: ubuntu-latest
    env:
      GITHUB_GIST_ID: ${{ secrets.GITHUB_GIST_ID }}
      GITHUB_GIST_TOKEN: ${{ secrets.GITHUB_GIST_TOKEN }}
      GIST_FILENAME: ${{ vars.GIST_FILENAME }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0 

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Download Raw Artifact
      uses: actions/download-artifact@v4
      with:
        name: raw-nodes

    # --- [已存在] 关键字过滤阶段 ---
    - name: Filter Nodes by Keywords
      run: |
        echo "开始执行关键字过滤..."
        if [ -f "filter_nodes.py" ]; then
          python filter_nodes.py
          if [ -f "nodes_filtered.txt" ]; then
            mv nodes_filtered.txt nodes.txt
            echo "✅ 关键字过滤完成，已生成最新 nodes.txt"
          fi
        else
          echo "⚠️ 未找到 filter_nodes.py 脚本，跳过关键字过滤阶段。"
        fi

    # --- 环境安装与测速 ---
    - name: Install Environment & Update GeoIP Database
      run: |
        python -m pip install --upgrade pip
        pip install maxminddb PyYAML
        
        echo "尝试下载最新的 GeoLite2-Country 数据库..."
        if wget -T 15 -qO temp_GeoLite2.mmdb "https://github.com/P3TERX/GeoLite.mmdb/releases/latest/download/GeoLite2-Country.mmdb"; then
          echo "✅ 成功下载最新的 GeoIP 数据库。"
          mv temp_GeoLite2.mmdb GeoLite2-Country.mmdb
          cp GeoLite2-Country.mmdb geoip.mmdb
          
          if [ -n "$(git status --porcelain GeoLite2-Country.mmdb)" ]; then
            echo "发现 GeoIP 数据库存在更新，正在将其同步推送回当前代码分支..."
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add GeoLite2-Country.mmdb
            git commit -m "Auto-update GeoLite2-Country.mmdb [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
            echo "✅ 数据库代码库同步完成！"
          else
            echo "✅ 当前分支的数据库已是最新，无需执行 Git 提交。"
          fi
        else
          echo "⚠️ 下载最新 GeoIP 数据库失败或超时，开始启用本地回退策略！"
          rm -f temp_GeoLite2.mmdb
          if [ -f "GeoLite2-Country.mmdb" ]; then
            cp GeoLite2-Country.mmdb geoip.mmdb
            echo "✅ 成功提取当前分支中历史缓存的 GeoLite2-Country.mmdb 用于节点解析。"
          else
            echo "❌ 错误：本地也未找到 GeoLite2-Country.mmdb。"
          fi
        fi

    - name: Run Check Active Script
      run: |
        python check_active.py

    - name: Upload Subscription to Gist
      if: env.GITHUB_GIST_ID != '' && env.GITHUB_GIST_TOKEN != ''
      run: |
        echo "::add-mask::$GITHUB_GIST_TOKEN"
        python upload_workers_yaml_to_gist.py \
          --upload-file sub.txt \
          --gist-id "$GITHUB_GIST_ID" \
          --gist-token "$GITHUB_GIST_TOKEN" \
          --gist-filename "${GIST_FILENAME:-sub.txt}"

    - name: Skip Gist Upload When Secrets Missing
      if: env.GITHUB_GIST_ID == '' || env.GITHUB_GIST_TOKEN == ''
      run: |
        echo "未设置 GITHUB_GIST_ID 或 GITHUB_GIST_TOKEN，已跳过 Gist 上传。"
